    <!-- Contact Page -->
    <div id="contact" class="page">
        <div class="section">
            <h2>Get In Touch</h2>
            <div class="contact-container">
                <form>
                    <div class="form-group">
                        <label for="title">Title</label>
                        <select id="title">
                            <option value="" disabled selected>Select a title</option>
                            <option value="mr">Mr.</option>
                            <option value="mrs">Mrs.</option>
                            <option value="ms">Ms.</option>
                            <option value="dr">Dr.</option>
                            <option value="prof">Prof.</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" placeholder="What's this about?">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" placeholder="Tell us more..."></textarea>
                    </div>

                    <button type="submit" class="submit-button">Send Message</button>
                </form>

                <div class="contact-info">
                    <p><strong>Email:</strong> tzdhz@umsystem.edu</p>
                    <p><strong>Phone:</strong> (626) 267-1376</p>
                    <p><strong>Location:</strong> Columbia, MO</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->

    </footer>
